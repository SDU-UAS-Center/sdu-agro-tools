name: Publish QGIS packages as a release on github.

on:
  push:
    tags:
      - v[0-9]+.[0-9]+.[0-9]+

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install the project
        run: uv sync --all-extras --dev
      - name: Package project
        run: uv run make -C src/sdu_agro_tools/ package
      - name: Store the QGIS package
        uses: actions/upload-artifact@v7
        with:
          name: qgis-package
          path: SDU_Agro_Tools.zip
  github-release:
    name: Make github release and upload package
    needs:
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write # IMPORTANT: mandatory for making GitHub Releases
    steps:
      - name: Download QGIS package artifact
        uses: actions/download-artifact@v7
        with:
          name: qgis-package
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release create
          "$GITHUB_REF_NAME"
          --repo "$GITHUB_REPOSITORY"
          --generate-notes
      - name: Upload QGIS package to GitHub Release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          gh release upload
          "$GITHUB_REF_NAME" SDU_Agro_Tools.zip
          --repo "$GITHUB_REPOSITORY"
